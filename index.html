<!DOCTYPE html>
<html>
<head>
    <title>Train Game Dev</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=25">
</head>
<body>
    <div id="lobby-container">
        <h1 style="text-shadow: 2px 2px 4px black;">🚂 Les Aventuriers du Rail</h1>
        
        <!-- Section de connexion -->
        <div id="auth-section">
            <button class="lobby-btn" style="background: #db4437;" onclick="loginWithGoogle()">S'identifier avec Google</button>
        </div>

        <!-- Actions du salon (cachées si non connecté) xxx-->
        <div id="lobby-actions" class="hidden-view" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <p style="font-size: 18px;">Bienvenue, <b id="user-name-display" style="color: #2ecc71;"></b> ! <a href="#" onclick="logout()" style="color: #e74c3c; font-size: 14px; margin-left: 10px;">(Déconnexion)</a></p>
            <input type="text" id="game-name-input" class="lobby-input" placeholder="Nom de la partie (Optionnel)" maxlength="30" style="margin-top: 15px;" />
            <button class="lobby-btn" onclick="createNewGame()">Créer une nouvelle partie</button>
            <div class="game-list" id="games-list">
                <i>Chargement des parties en cours...</i>
            </div>
        </div>
    </div>

    <!-- NOUVEAU : Salon d'attente avant le début du jeu xxx-->
    <div id="waiting-room-container" class="hidden-view" style="display:flex; flex-direction:column; align-items:center; color:white; margin-top: 10vh; width:100%;">
        <div style="width: 100%; display: flex; justify-content: flex-end; padding-right: 20px; box-sizing: border-box; margin-top: -10px;">
            <button onclick="toggleChatMenu()" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer; font-weight: bold; position: relative;">
                💬 Chat
                <span id="chat-badge-lobby" class="history-badge-alert hidden-view"></span>
            </button>
        </div>
        <h2 style="text-shadow: 2px 2px 4px black; font-size:28px;">⏳ Salle d'attente</h2>
        <p style="font-size:18px;"><span id="waiting-game-id" style="font-weight:bold; color:#e67e22;"></span></p>
        <div id="game-options-container"></div>
        <div id="waiting-players-list" style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; margin: 20px 0; font-size:18px; line-height:1.8;"></div>
        <button id="start-game-btn" class="lobby-btn hidden-view" onclick="startActiveGame()"></button>
        <p id="waiting-msg" style="color: #f39c12; font-style: italic; font-size:18px; text-align:center;">En attente du créateur de la partie...</p>
        <button onclick="leaveGameToLobby()" style="margin-top: 20px; padding: 10px 20px; background: #7f8c8d; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">⬅ Retour à l'accueil</button>
    </div>

    <div id="game-container" class="hidden-view">
        <div id="ui-top">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; padding: 0 10px 5px 10px; box-sizing: border-box;">
                <div style="display: flex; gap: 5px; flex: 1;">
                    <button onclick="leaveGameToLobby()" style="padding: 6px 12px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer; font-weight: bold;">⬅ Quitter</button>
                    <button id="dev-switch-btn" onclick="debugSwitchPlayer()" class="hidden-view" style="padding: 6px 12px; background: #8e44ad; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔄 Vue</button>
                </div>
                <div id="turn-banner" style="margin: 0; flex-shrink: 0;"></div>
                <div style="display: flex; gap: 5px; flex: 1; justify-content: flex-end;">
                    <button onclick="toggleChatMenu()" style="padding: 6px 12px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer; font-weight: bold; position: relative;">
                        💬 Chat
                        <span id="chat-badge-game" class="history-badge-alert hidden-view"></span>
                    </button>
                    <button onclick="toggleHistoryMenu()" style="padding: 6px 12px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer; font-weight: bold; position: relative;">
                        📜 Log
                        <span id="history-badge" class="history-badge-alert hidden-view"></span>
                    </button>
                </div>
            </div>
            <div id="players-info-container"></div>
        </div>

        <svg id="map-svg" viewBox="0 0 800 600"></svg>

        <!-- Journal de bord du Fugitif -->
        <div id="travel-log-sidebar" class="hidden-view">
            <div class="travel-header">Traque</div>
            <div id="travel-log-content"></div>
        </div>

        <div id="ui-bottom">
        </div>
    </div>
  
    <!-- Menu Latéral Chat -->
    <div id="chat-sidebar">
        <div class="history-header" style="border-bottom-color: #3498db;">
            <h3>💬 Chat de partie</h3>
            <button class="history-close-btn" onclick="toggleChatMenu()">✖</button>
        </div>
        <div id="chat-content"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Votre message..." onkeypress="if(event.key === 'Enter') sendChatMessage(event)">
            <button onclick="sendChatMessage()">Envoyer</button>
        </div>
    </div>

    <!-- Menu Latéral Historique -->
    <div id="history-sidebar">
        <div class="history-header">
            <h3>📜 Historique d'actions</h3>
            <button class="history-close-btn" onclick="toggleHistoryMenu()">✖</button>
        </div>
        <div id="history-content"></div>
    </div>

    <!-- Boîte de dialogue Modale -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div id="modal-text"></div>
            <div id="modal-options" class="modal-options"></div>
        </div>
    </div>

    <!-- Conteneur pour les notifications (Toasts) -->
    <div id="toast-container"></div>

    <!-- Importation de Supabase via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data.js?v=25"></script>
    <script src="ui.js?v=25"></script>
    <script src="game.js?v=25"></script>

    <!-- NETTOYAGE COMPLET DU CACHE POUR LE DÉVELOPPEMENT -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister(); // Désinstalle le bouclier hors-ligne
                }
            });
        }
        // Supprime toutes les mémoires en cache existantes
        caches.keys().then(function(names) { for (let name of names) caches.delete(name); });
    </script>
</body>
</html>
