        #sidebar { width: 300px; background: #1a252f; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10; }
        #workspace { flex-grow: 1; overflow: auto; position: relative; background: #34495e; }
        svg { background: #000; cursor: crosshair; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .mode-btn { background: #7f8c8d; color: white; }
        .mode-btn.active { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        #export-btn { background: #e74c3c; color: white; margin-top: auto; }
        .info { font-size: 12px; color: #bdc3c7; line-height: 1.5; }
        textarea { flex-grow: 1; margin-top: 10px; background: #2c3e50; color: #ecf0f1; border: 1px solid #7f8c8d; border-radius: 5px; padding: 5px; font-family: monospace; font-size: 11px; resize: none; white-space: pre; }
    </style>

    <div id="sidebar">
        <h2 style="margin-top: 0; text-align: center;">Éditeur de Carte</h2>
        
        <div class="info"><b>1. Image de fond :</b><br>Modifie les valeurs si besoin.</div>
        <div style="display: flex; gap: 10px;">

        </div>

        <div class="info"><b>2. Outils :</b><br>Choisis ce que tu veux tracer.</div>
        <button class="mode-btn active" id="btn-node" onclick="setMode('node')">📍 1. Placer les Stations</button>
        <button class="mode-btn" id="btn-taxi" onclick="setMode('TAXI')" style="border-left: 5px solid white;">🚕 2. Relier Taxi</button>
        <button class="mode-btn" id="btn-bus" onclick="setMode('BUS')" style="border-left: 5px solid #555FB5;">🚌 3. Relier Bus</button>
        <button class="mode-btn" id="btn-metro" onclick="setMode('UNDERGROUND')" style="border-left: 5px solid #e74c3c;">🚇 4. Relier Métro</button>

        <button class="mode-btn" id="btn-undo" onclick="undo()" style="margin-top: 10px; background: #95a5a6; color: white;">↩ Annuler (Ctrl+Z)</button>

        <div class="info" style="margin-top: 10px;"><b>3. Filtres d'affichage :</b></div>
        <div style="display: flex; gap: 10px; font-size: 12px;">
            <label><input type="checkbox" id="show-taxi" onchange="render()"> 🚕 Taxis</label>
            <label><input type="checkbox" id="show-bus" checked onchange="render()"> 🚌 Bus</label>
            <label><input type="checkbox" id="show-metro" checked onchange="render()"> 🚇 Métro</label>
        </div>

        <div class="info" id="instructions" style="color: #f1c40f;"><b>Mode Station :</b> Clique sur la carte pour ajouter une station.</div>

        <button id="export-btn" onclick="exportData()">📦 Générer le code data.js</button>
        <textarea id="output"></textarea>
    </div>

            { from: 174, to: 175, type: "TAXI", svgPath: "M 1313 860 C 1333 876, 1352 893, 1375 909" },

            { from: 160, to: 161, type: "TAXI", svgPath: "M 1170 796 C 1200 793, 1230 790, 1261 787" },
            { from: 161, to: 174, type: "TAXI", svgPath: "M 1261 787 C 1278 811, 1295 835, 1313 860" }
        ].map((l, index) => {
            l.id = index + 1; // Donne un ID unique à chaque ligne
            const parts = l.svgPath ? l.svgPath.match(/C\s+(\d+)\s+(\d+),\s+(\d+)\s+(\d+)/) : null;
            if(parts) { l.cx1 = parseInt(parts[1]); l.cy1 = parseInt(parts[2]); l.cx2 = parseInt(parts[3]); l.cy2 = parseInt(parts[4]); }
            return l;
        });
        let currentStationId = 200;
        let selectedNode = null;
        let draggedHandle = null;
        let actionHistory = [];

        const COLORS = { 'TAXI': '#ffffff', 'BUS': '#555FB5', 'UNDERGROUND': '#e74c3c' };

        function updateSize() {
            const w = document.getElementById('img-w').value;
            const h = document.getElementById('img-h').value;
            svg.setAttribute('width', w); svg.setAttribute('height', h);
            document.getElementById('bg-image').setAttribute('width', w);
            document.getElementById('bg-image').setAttribute('height', h);
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            if (mode === 'node') {
                document.getElementById('btn-node').classList.add('active');
                document.getElementById('instructions').innerHTML = "<b>Mode Station :</b> Clique sur la carte pour placer la station N°" + currentStationId;
            } else {
                document.getElementById('btn-' + mode.toLowerCase().split('u')[0]).classList.add('active'); // Astuce sélecteur
                document.getElementById('instructions').innerHTML = `<b>Mode ${mode} :</b> Clique sur une station A, puis une station B pour les relier.<br><br><i>Astuce : Tire sur le petit carré au milieu de la ligne pour la courber !</i>`;
            }
            selectedNode = null;
            render();
        }

        // --- GESTION DES CLICS SUR LA CARTE ---
        svg.addEventListener('pointerdown', (e) => {
            const rect = svg.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);

            // 1. Si on a cliqué sur une poignée de courbure
            if (e.target.classList.contains('curve-handle')) {
                draggedHandle = {
                    link: links.find(l => l.id === parseInt(e.target.dataset.id)),
                    index: parseInt(e.target.dataset.handle)
                };
                svg.setPointerCapture(e.pointerId);
                return;
            }

            // 2. Si on a cliqué sur une station existante
            if (e.target.classList.contains('station-node')) {
                const clickedNode = nodes.find(n => n.id === parseInt(e.target.dataset.id));
                if (mode !== 'node') {
                    if (!selectedNode) {
                        selectedNode = clickedNode; // On sélectionne la première station
                    } else {
                        if (selectedNode.id !== clickedNode.id) {
                            // On crée le lien avec DEUX points de contrôle (courbe de Bézier cubique) au 1/3 et 2/3
                            const cx1 = Math.round(selectedNode.x + (clickedNode.x - selectedNode.x) * 0.33);
                            const cy1 = Math.round(selectedNode.y + (clickedNode.y - selectedNode.y) * 0.33);
                            const cx2 = Math.round(selectedNode.x + (clickedNode.x - selectedNode.x) * 0.66);
                            const cy2 = Math.round(selectedNode.y + (clickedNode.y - selectedNode.y) * 0.66);
                            links.push({ id: links.length + 1, from: selectedNode.id, to: clickedNode.id, type: mode, cx1, cy1, cx2, cy2 });
                            actionHistory.push('link');
                        }
                        selectedNode = null; // On désélectionne après avoir relié
                    }
                    render();
                }
                return;
            }

            // 3. Si on clique dans le vide en mode "Station"
            if (mode === 'node') {
                nodes.push({ id: currentStationId, x: x, y: y });
                currentStationId++;
                actionHistory.push('node');
                document.getElementById('instructions').innerHTML = "<b>Mode Station :</b> Clique sur la carte pour placer la station N°" + currentStationId;
                render();
            } else {
                selectedNode = null;
                render();
            }
        });

        // --- GESTION DU GLISSER-DÉPOSER POUR COURBER LES LIGNES ---
        svg.addEventListener('pointermove', (e) => {
            if (draggedHandle) {
                const rect = svg.getBoundingClientRect();
                if (draggedHandle.index === 1) {
                    draggedHandle.link.cx1 = Math.round(e.clientX - rect.left);
                    draggedHandle.link.cy1 = Math.round(e.clientY - rect.top);
                } else {
                    draggedHandle.link.cx2 = Math.round(e.clientX - rect.left);
                    draggedHandle.link.cy2 = Math.round(e.clientY - rect.top);
                }
                render();
            }
        });

        svg.addEventListener('pointerup', () => { draggedHandle = null; });

        // --- ANNULATION (UNDO) ---
        function undo() {
            const lastAction = actionHistory.pop();
            if (lastAction === 'node') {
                nodes.pop();
                currentStationId--;
                document.getElementById('instructions').innerHTML = "<b>Mode Station :</b> Clique sur la carte pour placer la station N°" + currentStationId;
            } else if (lastAction === 'link') {
                links.pop();
            } else { return; }
            selectedNode = null;
            render();
        }
        document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); } });

        // --- RENDU VISUEL ---
        function render() {
            nodesLayer.innerHTML = '';
            linksLayer.innerHTML = '';
            handlesLayer.innerHTML = '';

            // Dessine les lignes
            const showTaxi = document.getElementById('show-taxi')?.checked;
            const showBus = document.getElementById('show-bus')?.checked;
            const showMetro = document.getElementById('show-metro')?.checked;

            links.forEach(l => {
                if (l.type === 'TAXI' && !showTaxi) return;
                if (l.type === 'BUS' && !showBus) return;
                if (l.type === 'UNDERGROUND' && !showMetro) return;

                const n1 = nodes.find(n => n.id === l.from);
                const n2 = nodes.find(n => n.id === l.to);
                if (!n1 || !n2) return;

                // Path SVG avec Courbe de Bézier Cubique (C)
                const pathStr = `M ${n1.x} ${n1.y} C ${l.cx1} ${l.cy1}, ${l.cx2} ${l.cy2}, ${n2.x} ${n2.y}`;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathStr);
                path.setAttribute("fill", "none");
                path.setAttribute("stroke", COLORS[l.type]);
                path.setAttribute("stroke-width", l.type === 'UNDERGROUND' ? "8" : (l.type === 'BUS' ? "5" : "2"));
                path.setAttribute("opacity", "0.7");
                linksLayer.appendChild(path);

                // Dessine les 2 poignées de courbure (uniquement visibles si on est dans un mode Route)
                if (mode !== 'node') {
                    const createHandle = (cx, cy, index) => {
                        const handle = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                        handle.setAttribute("x", cx - 6); handle.setAttribute("y", cy - 6);
                        handle.setAttribute("width", "12"); handle.setAttribute("height", "12");
                        handle.setAttribute("fill", index === 1 ? "#f39c12" : "#e67e22"); // Différence de couleur subtile
                        handle.setAttribute("cursor", "move");
                        handle.setAttribute("class", "curve-handle");
                        handle.dataset.id = l.id;
                        handle.dataset.handle = index;
                        handlesLayer.appendChild(handle);
                    };
                    createHandle(l.cx1, l.cy1, 1);
                    createHandle(l.cx2, l.cy2, 2);
                }
            });

            // Dessine les stations
            nodes.forEach(n => {
                const isSelected = selectedNode && selectedNode.id === n.id;
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", n.x); circle.setAttribute("cy", n.y);
                circle.setAttribute("r", isSelected ? "15" : "10");
                circle.setAttribute("fill", isSelected ? "#f1c40f" : "#2ecc71");
                circle.setAttribute("class", "station-node");
                circle.setAttribute("cursor", "pointer");
                circle.dataset.id = n.id;
                nodesLayer.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", n.x); text.setAttribute("y", n.y + 4);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "black");
                text.setAttribute("font-size", "12px");
                text.setAttribute("font-weight", "bold");
                text.setAttribute("pointer-events", "none");
                text.textContent = n.id;
                nodesLayer.appendChild(text);
            });
        }
        
        window.onload = render; // Charge tes stations dès l'ouverture !

        // --- GÉNÉRATION DU CODE FINAL ---
        function exportData() {
            let out = "// --- À COPIER-COLLER DANS data.js ---\n\n";
            out += "const MAP = {\n    nodes: [\n";
            
            // Formatage des stations
            nodes.forEach(n => {
                out += `        { id: ${n.id}, x: ${n.x}, y: ${n.y} },\n`;
            });
            out += "    ],\n    links: [\n";

            // Formatage des liens avec le svgPath
            links.forEach(l => {
                const n1 = nodes.find(n => n.id === l.from);
                const n2 = nodes.find(n => n.id === l.to);
                const pathStr = `M ${n1.x} ${n1.y} C ${l.cx1} ${l.cy1}, ${l.cx2} ${l.cy2}, ${n2.x} ${n2.y}`;
                out += `        { from: ${l.from}, to: ${l.to}, type: "${l.type}", svgPath: "${pathStr}" },\n`;
            });
            out += "    ]\n};\n";

            document.getElementById('output').value = out;
            alert("Code généré en bas à gauche ! Copie-le dans ton fichier data.js.");
        }
